kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["sh", "-c", "pnpm --filter @workspace/db run push --force && node artifacts/api-server/dist/index.cjs"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
